version: '3.8'

services:
  app:
    build: .
    image: bl-damage-classifier:latest
    restart: on-failure
    volumes:
      - ./src:/src
      - ./interface:/interface
      - ./data/cma/logs/processed_rows:/data/cma/logs/processed_rows
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017   
    command: poetry run uvicorn interface.rest_api.app:app --host 0.0.0.0
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ui:
    image: bl-damage-classifier:latest
    restart: on-failure
    volumes:
      - ./src:/src
      - ./interface:/interface
      - ./data/comparsion:/data/comparsion
      - ./.streamlit:/.streamlit
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017
    command: poetry run streamlit run interface/streamlit/app.py --server.port=8501 --server.address=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  mongo:
    image: mongo:latest
    restart: always
    command: [ "mongod", "--quiet" ]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - ui

volumes:
  mongo-data:
